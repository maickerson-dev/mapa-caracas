, "Medicamentos de primera necesidad", "Colchonetas, sábanas, linternas, baterías.", "Dinero.", "Voluntariado."], "horarios": "Todo el día", "contacto": null}, {"nombre": "Sede del Sistema de Orquestas y Coros", "zona": "Quebrada Onda", "lat": 10.501323977561139, "lng": -66.89412986678074, "exact": true, "rubro": "Mixtos", "vigencia": "Operativo", "articulos": ["Cobijas y Sabanas", "Alimentos no perecederos", "Marcadores y cinta adhesiva"], "horarios": "9am - 3pm", "contacto": null}, {"nombre": "Hogar bambi", "zona": "San Bernardino", "lat": 10.52035006978028, "lng": -66.9027201779089, "exact": true, "rubro": "Mixtos", "vigencia": "Operativo", "articulos": ["Sabanas, toallas", "Fórmula infantil, leche en polvo", "Cunas armables tipo graco"], "horarios": "8 am en adelante", "contacto": "+584143081107"}, {"nombre": "Plaza Francia de Altamira", "zona": "Urbanización Altamira, Chacao", "lat": 10.495703168789214, "lng": -66.84859831016468, "exact": true, "rubro": "Mixtos", "vigencia": "Operativo", "articulos": ["Alimentos no perecederos", "Kit de Higiene personal", "Medicamentos de uso común", "Mantas, Carpas, Colchones, Sleeping bag, linternas"], "horarios": "Todo el día", "contacto": null}];

const map = L.map('map', {
  tap: false // Desactiva delay de clics en librerías móviles antiguas
}).setView([10.495, -66.87], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

const listEl = document.getElementById('list');
const previewEl = document.getElementById('preview');
const searchInput = document.getElementById('searchInput');
const bounds = [];

places.forEach((p, i) => {
  const color = p.exact ? '#2e7d32' : '#e67e22';
  const marker = L.circleMarker([p.lat, p.lng], {
    radius: 9, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.95
  }).addTo(map);
  
  // Modificado para que el popup avise de forma clara tanto en web como celular
  marker.bindPopup(
    `<div class="popup-title">${p.nombre}</div>
     <div class="popup-sub">${p.zona}</div>
     <div class="popup-hint">✨ Ver detalles abajo</div>`
  );
  
  marker.on('click', () => selectPlace(i, false));
  p.marker = marker;
  bounds.push([p.lat, p.lng]);

  const item = document.createElement('div');
  item.className = 'item';
  item.dataset.index = i;
  item.innerHTML = `<span class="dot ${p.exact ? 'exact' : 'approx'}"></span>
    <div>
      <div class="name">${p.nombre}</div>
      <div class="zona">${p.zona}</div>
      <div class="rubro-tag">${p.rubro}</div>
    </div>`;
  item.addEventListener('click', () => selectPlace(i, true));
  listEl.appendChild(item);
});

map.fitBounds(bounds, { padding: [40, 40] });

function selectPlace(i, fly) {
  const p = places[i];

  document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.item[data-index="${i}"]`);
  if (el) { 
    el.classList.add('active'); 
    el.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); 
  }

  // Comportamiento de zoom optimizado
  if (fly) {
    map.flyTo([p.lat, p.lng], 15, { duration: 0.8 });
  } else {
    map.panTo([p.lat, p.lng]);
  }
  p.marker.openPopup();

  const itemsHtml = p.articulos && p.articulos.length
    ? `<ul class="ph-items">${p.articulos.map(a => `<li>${a}</li>`).join('')}</ul>`
    : `<div class="ph-horario" style="color:#999; font-style:italic;">No especificado</div>`;

  const contactoHtml = p.contacto
    ? `<div class="ph-section-title">Contacto</div><div class="ph-contacto">${p.contacto}</div>`
    : '';

  const instagramHtml = p.instagram
    ? `<div class="ph-section-title">Instagram</div><div class="ph-contacto"><a href="https://instagram.com/${p.instagram.replace('@','')}" target="_blank" rel="noopener">${p.instagram}</a></div>`
    : '';

  // Renderizado con el nuevo botón destacado para abrir directo en Google Maps app/web
  previewEl.innerHTML = `
    <div class="ph-name">${p.nombre}</div>
    <div class="ph-zona">${p.zona}</div>
    <div style="margin-top: 4px;">
      <span class="ph-tag ${p.exact ? 'exact' : 'approx'}">${p.exact ? '📍 Ubicación exacta' : '🔍 Ubicación aproximada'}</span>
      <span class="ph-tag rubro">${p.rubro}</span>
    </div>
    <div class="ph-section-title">Horario</div>
    <div class="ph-horario">${p.horarios}</div>
    <div class="ph-section-title">Está recibiendo</div>
    ${itemsHtml}
    ${contactoHtml}
    ${instagramHtml}
    <div class="ph-coords">Coordenadas: ${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}</div>
    
    <!-- NUEVO BOTÓN MAPS OPTIMIZADO PARA MÓVILES -->
    <a class="ph-btn-maps" href="https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}" target="_blank" rel="noopener">
      🗺️ Abrir ruta en Google Maps
    </a>
  `;
  
  // En móviles, hace un pequeño scroll automático hacia el detalle para que el usuario note que se abrió
  if(window.innerWidth <= 768) {
     previewEl.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  document.querySelectorAll('.item').forEach((el, i) => {
    const p = places[i];
    const match = p.nombre.toLowerCase().includes(q) || p.zona.toLowerCase().includes(q) || p.rubro.toLowerCase().includes(q);
    el.style.display = match ? 'flex' : 'none';
  });
});
</script>
