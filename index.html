<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
  #app { display: flex; flex-direction: column; height: 100%; }
  header { padding: 14px 18px; background: #1a1a2e; color: #fff; flex-shrink: 0; }
  header h1 { margin: 0; font-size: 18px; }
  header p { margin: 4px 0 0; font-size: 13px; color: #cfd2e0; }
  .legend { display: flex; gap: 16px; padding: 8px 18px; background: #f4f4f7; font-size: 12px; border-bottom: 1px solid #ddd; flex-shrink: 0; flex-wrap: wrap; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot.exact { background: #2e7d32; }
  .dot.approx { background: #e67e22; }

  #main { flex: 1; display: flex; min-height: 0; }

  #sidebar { width: 340px; flex-shrink: 0; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: #fff; }
  #search { padding: 10px; border-bottom: 1px solid #eee; flex-shrink: 0; }
  #search input { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
  #list { flex: 1; overflow-y: auto; }
  .item { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer; display: flex; align-items: flex-start; gap: 8px; }
  .item:hover { background: #f7f7fb; }
  .item.active { background: #e8eefc; border-left: 3px solid #3355dd; }
  .item .dot { margin-top: 4px; flex-shrink: 0; }
  .item .name { font-size: 13.5px; font-weight: 600; color: #222; }
  .item .zona { font-size: 12px; color: #777; margin-top: 1px; }
  .item .rubro-tag { font-size: 10.5px; color: #3355dd; margin-top: 2px; }

  #preview { border-top: 2px solid #eee; padding: 14px; background: #fafafa; flex-shrink: 0; max-height: 45%; overflow-y: auto; }
  #preview .ph-name { font-size: 15px; font-weight: 700; color: #1a1a2e; }
  #preview .ph-zona { font-size: 13px; color: #555; margin: 4px 0 8px; }
  #preview .ph-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; color: #fff; display: inline-block; margin-right: 6px; margin-bottom: 6px;}
  #preview .ph-tag.exact { background: #2e7d32; }
  #preview .ph-tag.approx { background: #e67e22; }
  #preview .ph-tag.rubro { background: #3355dd; }
  #preview .ph-section-title { font-size: 12px; font-weight: 700; color: #333; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.03em; }
  #preview .ph-horario, #preview .ph-contacto { font-size: 13px; color: #333; margin-top: 3px; }
  #preview ul.ph-items { margin: 4px 0 0; padding-left: 18px; font-size: 13px; color: #333; }
  #preview ul.ph-items li { margin-bottom: 2px; }
  #preview .ph-coords { font-size: 11px; color: #999; margin-top: 10px; font-family: monospace; }
  #preview .ph-placeholder { color: #999; font-size: 13px; }
  #preview .ph-link { display: inline-block; margin-top: 8px; font-size: 12px; color: #3355dd; text-decoration: none; }

  #map { flex: 1; }
  .popup-title { font-weight: 700; margin-bottom: 2px; font-size: 13px; }
  .popup-sub { font-size: 12px; color: #555; margin-bottom: 4px; }
  .popup-hint { font-size: 11px; color: #3355dd; }

  @media (max-width: 700px) {
    #main { flex-direction: column; }
    #sidebar { width: 100%; height: 50%; border-right: none; border-bottom: 1px solid #ddd; }
    #map { height: 50%; }
  }
</style>
</head>

<div id="app">

  </div>
  <div id="main">
    <div id="sidebar">

      <div id="list"></div>
      <div id="preview">

      </div>
    </div>
    <div id="map"></div>

</div>

const map = L.map('map').setView([10.495, -66.87], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

const listEl = document.getElementById('list');
const previewEl = document.getElementById('preview');
const searchInput = document.getElementById('searchInput');

const bounds = [];

places.forEach((p, i) => {
  const color = p.exact ? '#2e7d32' : '#e67e22';
  const marker = L.circleMarker([p.lat, p.lng], {
    radius: 8, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.95
  }).addTo(map);
  marker.bindPopup(
    `<div class="popup-title">${p.nombre}</div><div class="popup-sub">${p.zona} &middot; ${p.rubro}</div><div class="popup-hint">Ver detalles en el panel izquierdo &darr;</div>`
  );
  marker.on('click', () => selectPlace(i, false));
  p.marker = marker;
  bounds.push([p.lat, p.lng]);

  const item = document.createElement('div');
  item.className = 'item';
  item.dataset.index = i;
  item.innerHTML = `<span class="dot ${p.exact ? 'exact' : 'approx'}"></span>
    <div><div class="name">${p.nombre}</div><div class="zona">${p.zona}</div><div class="rubro-tag">${p.rubro}</div></div>`;
  item.addEventListener('click', () => selectPlace(i, true));
  listEl.appendChild(item);
});

map.fitBounds(bounds, { padding: [30, 30] });

function selectPlace(i, fly) {
  const p = places[i];

  document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.item[data-index="${i}"]`);
  if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }

  if (fly) map.flyTo([p.lat, p.lng], 16, { duration: 0.8 });
  p.marker.openPopup();

  const itemsHtml = p.articulos && p.articulos.length
    ? `<ul class="ph-items">${p.articulos.map(a => `<li>${a}</li>`).join('')}</ul>`
    : `<div class="ph-horario" style="color:#999;">No especificado</div>`;

  const contactoHtml = p.contacto
    ? `<div class="ph-section-title">Contacto</div><div class="ph-contacto">${p.contacto}</div>`
    : '';

  previewEl.innerHTML = `
    <div class="ph-name">${p.nombre}</div>
    <div class="ph-zona">${p.zona}</div>
    <span class="ph-tag ${p.exact ? 'exact' : 'approx'}">${p.exact ? 'Ubicación exacta' : 'Ubicación aproximada'}</span>
    <span class="ph-tag rubro">${p.rubro}</span>
    <div class="ph-section-title">Horario</div>
    <div class="ph-horario">${p.horarios}</div>
    <div class="ph-section-title">Está recibiendo</div>
    ${itemsHtml}
    ${contactoHtml}
    <div class="ph-coords">${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}</div>
    <a class="ph-link" href="https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}" target="_blank" rel="noopener">Abrir en Google Maps ↗</a>
  `;
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  document.querySelectorAll('.item').forEach((el, i) => {
    const p = places[i];
    const match = p.nombre.toLowerCase().includes(q) || p.zona.toLowerCase().includes(q) || p.rubro.toLowerCase().includes(q);
    el.style.display = match ? 'flex' : 'none';
  });
});
</script>
